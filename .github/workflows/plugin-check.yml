name: Plugin Check

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  plugin-check-latest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: WordPress/plugin-check-action@v1
      with:
        build-dir: '.'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        slug: "awdev-plugins-updater"
        wp-version: latest
        strict: true
  plugin-check-trunk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: WordPress/plugin-check-action@v1
      with:
        build-dir: '.'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        slug: "awdev-plugins-updater"
        wp-version: trunk
        include-experimental: true
        strict: true
