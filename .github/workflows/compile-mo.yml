name: Compile .mo Language Files

on:
  push:
    paths:
      - 'languages/**.po'
  workflow_dispatch:

jobs:
  compile-mo:
    name: Compile .po → .mo
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gettext (msgfmt)
        run: sudo apt-get install -y gettext

      - name: Compile all .po files to .mo
        run: |
          for po_file in languages/*.po; do
            mo_file="${po_file%.po}.mo"
            echo "Compiling: $po_file → $mo_file"
            msgfmt "$po_file" -o "$mo_file"
          done

      - name: Commit compiled .mo files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add languages/*.mo
          if git diff --cached --quiet; then
            echo "No .mo changes to commit."
          else
            git commit -m "ci: recompile .mo files from updated .po [skip ci]"
            git push
          fi
