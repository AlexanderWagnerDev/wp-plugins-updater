name: Generate .l10n.php Language Files

on:
  push:
    branches:
      - main
    paths:
      - 'languages/**.po'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-l10n:
    name: Compile .po to .l10n.php
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install WP-CLI
        run: |
          curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar
          sudo mv wp-cli.phar /usr/local/bin/wp

      - name: Generate .l10n.php files
        run: wp i18n make-php languages/

      - name: Commit generated .l10n.php files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add languages/*.l10n.php
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: regenerate .l10n.php language files"
            git push
          fi
