name: WP Complete Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  phpunit:
    name: WP ${{ matrix.wp }} + PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
        ports:
          - 3306:3306
    
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
        wp:
          - '6.0'
          - '6.1'
          - '6.2'
          - '6.3'
          - '6.4'
          - '6.5'
          - '6.6'
          - '6.7'
          - '6.8'
          - '6.9'
          - 'trunk'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup PHP ${{ matrix.php }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: mysql, imagick, gd, zip, mbstring

    - name: Install WP + Tests + Plugin
      run: |
        # WP Core + Test Suite + Plugin kopieren
        mkdir wp-tests && cd wp-tests
        
        if [ "${{ matrix.wp }}" = "trunk" ]; then
          svn co https://develop.svn.wordpress.org/trunk/ .
        else
          svn co https://wordpress.org/tags/${{ matrix.wp }}/. .
        fi
        
        # Plugin ins WP-Verzeichnis kopieren
        cp -rf ../* wp-content/plugins/awdev-plugins-updater/
        
        # DB erstellen
        mysql -h127.0.0.1 -P${{ job.services.mysql.ports[3306] }} -uwordpress -pwordpress <<< "CREATE DATABASE wordpress_test"
        
        # WP Tests setup (macht wp-config.php + DB-Setup)
        bash tools/phpunit/setup.sh wordpress_test wordpress wordpress 127.0.0.1:${{ job.services.mysql.ports[3306] }} ${{ matrix.wp }}
        
        echo "WP_TESTS_DIR=$(pwd)" >> $GITHUB_ENV
        echo "✓ WP ${{ matrix.wp }} ready!"

    - name: Activate & Test Plugin
      working-directory: ${{ env.WP_TESTS_DIR }}
      run: |
        echo "=== WP-CLI Status ==="
        wp core version
        wp plugin list
        
        echo "=== Activate AWDev Plugins Updater ==="
        wp plugin activate awdev-plugins-updater --quiet
        
        echo "=== Plugin activated - run tests ==="
        wp plugin list
        
        echo "=== Run PHPUnit Tests ==="
        ./vendor/bin/phpunit ../phpunit.xml --verbose

    - name: Upload Debug Logs
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: failure-${{ matrix.php }}-${{ matrix.wp }}
        path: |
          ${{ env.WP_TESTS_DIR }}/wp-content/debug.log
          ${{ env.WP_TESTS_DIR }}/*.log

  plugin-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: WordPress/plugin-check-action@v1
      with:
        build-dir: '.'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        slug: "awdev-plugins-updater"
