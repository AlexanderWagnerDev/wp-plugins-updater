name: WP Complete Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  phpunit:
    name: WP ${{ matrix.wp }} + PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
        ports:
          - 3306:3306
        options: >-
            --health-cmd="mysqladmin ping -hlocalhost -uwordpress -pwordpress"
            --health-interval=10s
            --health-timeout=5s
            --health-retries=5
    
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
        wp:
          - '6.0'
          - '6.1'
          - '6.2'
          - '6.3'
          - '6.4'
          - '6.5'
          - '6.6'
          - '6.7'
          - '6.8'
          - '6.9'
          - 'trunk'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup PHP ${{ matrix.php }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: mysql, imagick, gd, zip, mbstring
        tools: wp-cli

    - name: WP-CLI Full Setup + Tests
      run: |
       timeout 120s bash -c '
       until mysql -h127.0.0.1 -P${{ job.services.mysql.ports[3306] }} \
        -uwordpress -pwordpress -e "SELECT 1" wordpress_test >/dev/null 2>&1; do
        echo "Waiting for MySQL..."
        sleep 2
       done
       echo "MySQL ready!"
       '
       wp core download --version=${{ matrix.wp }} --path=wp-tests --quiet
       cd wp-tests
       
       wp config create \
       --dbname=wordpress_test \
       --dbuser=wordpress \
       --dbpass=wordpress \
       --dbhost=127.0.0.1:3306 \
       --quiet
       wp core install \
       --url="http://localhost" \
       --title="Test" \
       --admin_user="admin" \
       --admin_password="admin" \
       --admin_email="test@example.com" \
       --quiet \
       --allow-root

       cd ..
       wp scaffold plugin-tests awdev-plugins-updater --dir=wp-tests
       cd wp-tests/
       
       PLUGIN_DIR="wp-content/plugins/awdev-plugins-updater"
       rm -rf "$PLUGIN_DIR"
       mkdir -p "$PLUGIN_DIR"
       rsync -av --exclude='.git/' --exclude='.github/' --exclude='wp-tests/' --exclude='tests/' --exclude='tools/' ../* "$PLUGIN_DIR"/
       
       echo "WP_TESTS_DIR=$(pwd)" >> $GITHUB_ENV
       echo "✓ WP ${{ matrix.wp }} + Tests ready!"

    - name: Activate & Test Plugin
      working-directory: ${{ env.WP_TESTS_DIR }}
      run: |
        echo "=== WP-CLI Status ==="
        wp core version
        wp plugin list
        
        echo "=== Activate AWDev Plugins Updater ==="
        wp plugin activate awdev-plugins-updater --quiet --allow-root
        
        echo "=== Plugin activated - run tests ==="
        wp plugin list
        
        echo "=== Run PHPUnit Tests ==="
        ./vendor/bin/phpunit ../tests/phpunit/tests/ --verbose

    - name: Upload Debug Logs
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: failure-${{ matrix.php }}-${{ matrix.wp }}
        path: |
          ${{ env.WP_TESTS_DIR }}/wp-content/debug.log
          ${{ env.WP_TESTS_DIR }}/*.log

  plugin-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: WordPress/plugin-check-action@v1
      with:
        build-dir: '.'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        slug: "awdev-plugins-updater"
