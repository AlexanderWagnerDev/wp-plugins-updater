name: WP Complete Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  WORDPRESS_DIR: ${{ github.workspace }}/wordpress-test

jobs:
  phpunit:
    name: WP ${{ matrix.wp }} + PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mariadb:latest
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
          MYSQL_USER: wordpress
          MYSQL_PASSWORD: wordpress
        ports:
          - 3306:3306
    
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
        wp:
          - '6.0'
          - '6.1'
          - '6.2'
          - '6.3'
          - '6.4'
          - '6.5'
          - '6.6'
          - '6.7'
          - '6.8'
          - '6.9'
          - 'trunk'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Install SVN
      run: sudo apt-get update && sudo apt-get install -y subversion

    - name: Setup PHP ${{ matrix.php }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: mysql, imagick, gd, zip, mbstring
        coverage: none

    - name: Setup WordPress Test Environment
      id: wp-setup
      uses: sjinks/setup-wordpress-test-library@master
      with:
        version: ${{ matrix.wp }}
        dir: ${{ env.WORDPRESS_DIR }}
        db_host: 127.0.0.1:${{ job.services.mysql.ports[3306] }}
        db_user: wordpress
        db_password: wordpress
        db_name: wordpress_test

    - name: Prepare Plugin Directory
      run: |
        PLUGIN_SLUG="awdev-plugins-updater"
        mkdir -p ${{ env.WORDPRESS_DIR }}/wp-content/plugins/$PLUGIN_SLUG
        rsync -av --exclude='.git*' --exclude='.github' ./ ${{ env.WORDPRESS_DIR }}/wp-content/plugins/$PLUGIN_SLUG/

    - name: Activate Plugin
      run: |
        PLUGIN_SLUG="awdev-plugins-updater"
        ${{ env.WP_CLI }} plugin activate $PLUGIN_SLUG --path=${{ env.WORDPRESS_DIR }}

    - name: Run PHPUnit Tests
      working-directory: ${{ env.WORDPRESS_DIR }}
      run: |
        if [ -f ../tests/bootstrap.php ]; then
          ${{ env.WP_CLI }} eval-file ../tests/bootstrap.php --allow-root
        fi
        ../vendor/bin/phpunit ../phpunit.xml --verbose || true

    - name: Upload Debug Logs
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: failure-php-${{ matrix.php }}-wp-${{ matrix.wp }}
        path: |
          ${{ env.WORDPRESS_DIR }}/wp-content/debug.log
          ${{ env.WORDPRESS_DIR }}/wp-content/uploads/
          ${{ env.WORDPRESS_DIR }}/wp-content/plugins/awdev-plugins-updater/
          phpunit.xml

  plugin-check:
    name: Plugin Check (PCP)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Run WordPress Plugin Check
      uses: WordPress/plugin-check-action@v1
      with:
        build-dir: '.'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        wp-version: 'latest'
        php-version: '8.3'
        strict: true
        phpcs-args: "--runtime-set text_domain awdev-plugins-updater"

    - name: Upload PCP Report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: plugin-check-report
        path: pcp-report.json

  phpcs:
    name: PHP CodeSniffer (WPCS)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Install Composer Dependencies
      run: composer install --no-dev --optimize-autoloader

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        tools: composer

    - name: Run PHPCS
      run: ./vendor/bin/phpcs || true
